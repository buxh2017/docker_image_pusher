name: Sync Docker Images (Selective Arch)

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Select architecture to sync"
        required: true
        type: choice
        options:
          - arm64
          - amd64

env:
  ALIYUN_REGISTRY: "${{ vars.ALIYUN_REGISTRY }}"
  NAMESPACE_AMD64: "${{ vars.NAMESPACE_AMD64 }}"
  NAMESPACE_ARM64: "${{ vars.NAMESPACE_ARM64 }}"
  ALIYUN_USERNAME: "${{ vars.ALIYUN_REGISTRY_USER }}"
  ALIYUN_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login Aliyun
        run: |
          docker login -u $ALIYUN_USERNAME -p $ALIYUN_PASSWORD $ALIYUN_REGISTRY

      - name: Select image list
        id: list
        run: |
          if [ "${{ github.event.inputs.arch }}" = "arm64" ]; then
            echo "FILE=arm64-images.txt" >> $GITHUB_OUTPUT
            echo "ALIYUN_NAMESPACE=$NAMESPACE_ARM64" >> $GITHUB_ENV
          else
            echo "FILE=amd64-images.txt" >> $GITHUB_OUTPUT
            echo "ALIYUN_NAMESPACE=${{ secrets.NAMESPACE_AMD64 }}" >> $GITHUB_ENV
          fi

      - name: Sync Images
        run: |
          FILE=${{ steps.list.outputs.FILE }}
          # 检查文件是否存在，防止路径错误
          if [ ! -f "$FILE" ]; then
            echo "Error: $FILE not found!"
            exit 1
          fi

          echo "Using file: $FILE"
          echo "Target Namespace: $ALIYUN_NAMESPACE"

          # 使用 -n 判定文件是否为空，循环逻辑增强稳定性
          while IFS= read -r IMAGE || [ -n "$IMAGE" ]; do
            # 过滤空行和注释
            [[ -z "$IMAGE" || "$IMAGE" =~ ^# ]] && continue
            
            # 去除可能存在的 Windows 换行符 \r
            IMAGE=$(echo $IMAGE | tr -d '\r')

            IMAGE_NAME_TAG="${IMAGE##*/}"
            TARGET_IMAGE="$ALIYUN_REGISTRY/$ALIYUN_NAMESPACE/$IMAGE_NAME_TAG"

            echo "-----------------------------------"
            echo "Syncing $IMAGE -> $TARGET_IMAGE"

            docker pull --platform linux/${{ github.event.inputs.arch }} "$IMAGE"
            docker tag "$IMAGE" "$TARGET_IMAGE"
            docker push "$TARGET_IMAGE"

          done < "$FILE"

      - name: Job Finished
        run: echo "All images synced successfully."